<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff"></stop>
      <stop offset="100%" stop-color="#0072ff"></stop>
    </linearGradient>
  </defs>

  <!-- Center circle -->
  <circle cx="256" cy="200" r="80" fill="#0a0f1c" stroke="url(#blueGrad)" stroke-width="6" filter="url(#glow)"></circle>

  <!-- Shield -->
  <path d="M256 150 L300 170 L300 210 C300 240 256 260 256 260 C256 260 212 240 212 210 L212 170 Z" fill="#111827" stroke="#cbd5e1" stroke-width="3"></path>

  <!-- Bars -->
  <rect x="235" y="200" width="8" height="25" fill="#00c6ff"></rect>
  <rect x="250" y="190" width="8" height="35" fill="#00c6ff"></rect>
  <rect x="265" y="180" width="8" height="45" fill="#00c6ff"></rect>

  <!-- Nodes -->
  <g stroke="url(#blueGrad)" stroke-width="3" fill="#0a0f1c" filter="url(#glow)">
    <circle cx="256" cy="80" r="25"></circle>
    <circle cx="400" cy="160" r="25"></circle>
    <circle cx="400" cy="280" r="25"></circle>
    <circle cx="256" cy="360" r="25"></circle>
    <circle cx="112" cy="280" r="25"></circle>
    <circle cx="112" cy="160" r="25"></circle>
  </g>

  <!-- Connections -->
  <g stroke="url(#blueGrad)" stroke-width="2">
    <line x1="256" y1="120" x2="256" y2="160"></line>
    <line x1="330" y1="200" x2="375" y2="170"></line>
    <line x1="330" y1="240" x2="375" y2="270"></line>
    <line x1="256" y1="280" x2="256" y2="335"></line>
    <line x1="182" y1="240" x2="137" y2="270"></line>
    <line x1="182" y1="200" x2="137" y2="170"></line>
  </g>

  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" font-size="40" font-family="Segoe UI, Arial" fill="url(#blueGrad)" filter="url(#glow)">
    Centralized
  </text>

</svg>