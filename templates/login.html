<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — Centralized</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="login-body d-flex align-items-center justify-content-center min-vh-100">

<div class="login-card card shadow-lg p-4" style="width:100%;max-width:420px">
  <div class="text-center mb-4">
    <div class="login-icon mb-3">
      <i class="bi bi-shield-lock-fill text-primary" style="font-size:2.5rem"></i>
    </div>
    <h1 class="h4 fw-bold mb-1">Centralized</h1>
    <p class="text-muted small">Pentest Audit Platform</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show py-2" role="alert">
          {{ msg }}
          <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.login') }}" autocomplete="off" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

    <div class="mb-3">
      <label class="form-label small fw-semibold" for="username">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" class="form-control" id="username" name="username"
               placeholder="admin" required autocomplete="username"/>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label small fw-semibold" for="password">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password"/>
        <button class="btn btn-outline-secondary" type="button" id="togglePwd">
          <i class="bi bi-eye" id="togglePwdIcon"></i>
        </button>
      </div>
    </div>

    <div class="mb-4 form-check">
      <input class="form-check-input" type="checkbox" id="remember" name="remember"/>
      <label class="form-check-label small" for="remember">Remember me for 8 hours</label>
    </div>

    <button type="submit" class="btn btn-primary w-100 fw-semibold">
      <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
    </button>
  </form>

  <p class="text-center text-muted mt-4 small mb-0">
    Default: <code>admin</code> / <code>admin</code> — change after first login.
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePwd').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('togglePwdIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });
</script>
</body>
</html>
