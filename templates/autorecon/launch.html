{% extends "base.html" %}
{% block title %}AutoRecon{% endblock %}
{% block page_title %}AutoRecon{% endblock %}

{% block content %}
<div class="row g-3">

  <!-- ── Configuration panel ───────────────────────────────────────────────── -->
  <div class="col-12 col-xl-4">
    <div class="card">
      <div class="card-header fw-semibold">
        <i class="bi bi-gear me-2"></i>Configuration
      </div>
      <div class="card-body">

        <div class="mb-3">
          <label class="form-label fw-semibold">
            Cible <span class="text-danger">*</span>
          </label>
          <input id="ar-target" type="text" class="form-control font-monospace"
                 placeholder="example.com ou 10.0.0.1" autocomplete="off" spellcheck="false">
          <div class="form-text text-warning">
            <i class="bi bi-exclamation-triangle me-1"></i>
            Cibler uniquement des systèmes dont vous avez l'autorisation.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Threads</label>
          <input id="ar-threads" type="number" class="form-control" value="12" min="1" max="64">
        </div>

        <div class="mb-3 d-flex flex-column gap-2">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="ar-full">
            <label class="form-check-label" for="ar-full">
              Full Nmap (tous les ports)
            </label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="ar-no-crawl">
            <label class="form-check-label" for="ar-no-crawl">
              Désactiver le crawling web
            </label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="ar-no-nvd">
            <label class="form-check-label" for="ar-no-nvd">
              Désactiver la recherche NVD / CVE
            </label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="ar-pdf">
            <label class="form-check-label" for="ar-pdf">
              Générer un rapport PDF
            </label>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button id="btn-launch" class="btn btn-success flex-grow-1" onclick="launchScan()">
            <i class="bi bi-play-fill me-1"></i>Lancer
          </button>
          <button id="btn-stop" class="btn btn-danger flex-grow-1 d-none" onclick="stopScan()">
            <i class="bi bi-stop-fill me-1"></i>Arrêter
          </button>
        </div>

        <div id="scan-status" class="mt-3 small"></div>

      </div>
    </div>
  </div>

  <!-- ── Terminal panel ────────────────────────────────────────────────────── -->
  <div class="col-12 col-xl-8">
    <div class="card d-flex flex-column" style="height:calc(100vh - 140px); min-height:520px;">
      <div class="card-header d-flex align-items-center gap-2 fw-semibold">
        <i class="bi bi-terminal me-1"></i>Terminal
        <span id="term-badge" class="badge bg-secondary ms-auto" style="display:none!important">idle</span>
        <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="clearTerm()" title="Effacer">
          <i class="bi bi-trash"></i>
        </button>
      </div>

      <!-- xterm.js mount point -->
      <div class="card-body p-0 flex-grow-1 overflow-hidden" style="background:#0d0d0d;">
        <div id="terminal" style="height:100%; width:100%;"></div>
      </div>

      <!-- Stdin input bar -->
      <div class="card-footer p-2">
        <div class="input-group input-group-sm">
          <span class="input-group-text font-monospace text-muted">stdin&nbsp;&gt;</span>
          <input id="stdin-input" type="text" class="form-control font-monospace"
                 placeholder="Envoyer une entrée au processus (Entrée pour valider)…" disabled
                 autocomplete="off" spellcheck="false">
          <button class="btn btn-outline-secondary" id="btn-send-stdin"
                  onclick="sendStdin()" disabled title="Envoyer">
            <i class="bi bi-arrow-return-left"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<!-- xterm.js 4.x (stable UMD builds) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.19.0/css/xterm.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/xterm@4.19.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.min.js"></script>

<script>
/* ── xterm init ─────────────────────────────────────────────────────────── */
const term = new Terminal({
  theme: {
    background:  '#0d0d0d',
    foreground:  '#d4d4d4',
    cursor:      '#d4d4d4',
    black:       '#1e1e1e',
    brightBlack: '#555555',
  },
  fontFamily: "'Cascadia Code', 'Consolas', 'Courier New', monospace",
  fontSize: 13,
  lineHeight: 1.25,
  scrollback: 10000,
  convertEol: true,  // \n → \r\n automatically
  disableStdin: true,
  cursorBlink: false,
});

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));

function fitTerm() {
  try { fitAddon.fit(); } catch (_) {}
}
fitTerm();
new ResizeObserver(fitTerm).observe(document.getElementById('terminal'));
window.addEventListener('resize', fitTerm);

/* ── State ──────────────────────────────────────────────────────────────── */
const CSRF = () => document.querySelector('meta[name="csrf-token"]').content;
let currentSession  = null;
let currentEvtSrc   = null;

/* ── Helpers ────────────────────────────────────────────────────────────── */
function setStatus(msg, cls = 'text-muted') {
  const el = document.getElementById('scan-status');
  el.className = `mt-3 small ${cls}`;
  el.textContent = msg;
}

function setBadge(text, cls) {
  const b = document.getElementById('term-badge');
  b.textContent = text;
  b.className = `badge ms-auto ${cls}`;
  b.style.display = '';
}

function clearTerm() { term.clear(); }

function enableStdin(yes) {
  document.getElementById('stdin-input').disabled = !yes;
  document.getElementById('btn-send-stdin').disabled = !yes;
  if (yes) document.getElementById('stdin-input').focus();
}

function setScanUI(running) {
  document.getElementById('btn-launch').classList.toggle('d-none',  running);
  document.getElementById('btn-stop').classList.toggle('d-none',   !running);
  enableStdin(running);
}

/* ── Launch ─────────────────────────────────────────────────────────────── */
async function launchScan() {
  const target = document.getElementById('ar-target').value.trim();
  if (!target) {
    setStatus('Veuillez saisir une cible.', 'text-warning');
    return;
  }

  if (currentEvtSrc) { currentEvtSrc.close(); currentEvtSrc = null; }

  term.clear();
  term.writeln('\x1b[1;32m╔══════════════════════════════════════╗\x1b[0m');
  term.writeln('\x1b[1;32m║       AutoRecon — Centralized        ║\x1b[0m');
  term.writeln('\x1b[1;32m╚══════════════════════════════════════╝\x1b[0m');
  term.writeln(`\x1b[1;37mCible : \x1b[0;36m${target}\x1b[0m`);
  term.writeln('');

  const payload = {
    target,
    threads:  parseInt(document.getElementById('ar-threads').value) || 12,
    full:     document.getElementById('ar-full').checked,
    no_crawl: document.getElementById('ar-no-crawl').checked,
    no_nvd:   document.getElementById('ar-no-nvd').checked,
    pdf:      document.getElementById('ar-pdf').checked,
  };

  let resp;
  try {
    resp = await fetch('/autorecon/start', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF() },
      body:    JSON.stringify(payload),
    });
  } catch (e) {
    term.writeln(`\x1b[1;31m[Erreur réseau] ${e}\x1b[0m`);
    setStatus(`Erreur réseau : ${e}`, 'text-danger');
    return;
  }

  const json = await resp.json();
  if (!resp.ok) {
    term.writeln(`\x1b[1;31m[Erreur] ${json.error}\x1b[0m`);
    setStatus(json.error, 'text-danger');
    return;
  }

  currentSession = json.session_id;
  setScanUI(true);
  setBadge('running', 'bg-success');
  setStatus('Scan en cours…', 'text-success');

  // Open SSE stream
  currentEvtSrc = new EventSource(`/autorecon/stream/${currentSession}`);

  currentEvtSrc.onmessage = (e) => {
    if (e.data === '\x00') {
      term.writeln('');
      term.writeln('\x1b[1;32m[Centralized] Scan terminé.\x1b[0m');
      onScanEnded('Scan terminé.', 'text-success');
      return;
    }
    term.writeln(e.data);
  };

  currentEvtSrc.onerror = () => {
    if (currentSession) {
      term.writeln('\x1b[1;31m[Centralized] Connexion SSE perdue.\x1b[0m');
      onScanEnded('Connexion perdue.', 'text-danger');
    }
  };
}

/* ── Stop ───────────────────────────────────────────────────────────────── */
async function stopScan() {
  if (!currentSession) return;
  if (!confirm('Arrêter le scan en cours ?')) return;

  const sid = currentSession;
  currentSession = null;
  if (currentEvtSrc) { currentEvtSrc.close(); currentEvtSrc = null; }

  await fetch(`/autorecon/kill/${sid}`, {
    method:  'POST',
    headers: { 'X-CSRFToken': CSRF() },
  });

  term.writeln('');
  term.writeln('\x1b[1;33m[Centralized] Scan arrêté manuellement.\x1b[0m');
  onScanEnded('Scan arrêté.', 'text-warning');
}

/* ── Scan ended (common cleanup) ────────────────────────────────────────── */
function onScanEnded(msg, cls) {
  currentSession = null;
  if (currentEvtSrc) { currentEvtSrc.close(); currentEvtSrc = null; }
  setScanUI(false);
  setBadge('done', 'bg-secondary');
  setStatus(msg, cls);
}

/* ── Stdin ──────────────────────────────────────────────────────────────── */
async function sendStdin() {
  if (!currentSession) return;
  const inp  = document.getElementById('stdin-input');
  const text = inp.value;
  inp.value  = '';
  term.writeln(`\x1b[90m> ${text}\x1b[0m`);

  await fetch(`/autorecon/input/${currentSession}`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF() },
    body:    JSON.stringify({ input: text }),
  });
}

document.getElementById('stdin-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendStdin();
});
</script>
{% endblock %}
