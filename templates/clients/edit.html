{% extends "base.html" %}
{% block title %}Edit {{ client.name }}{% endblock %}
{% block page_title %}Edit Client{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header fw-semibold"><i class="bi bi-pencil me-2"></i>Edit Client</div>
      <div class="card-body">
        <form method="POST" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="mb-3">
            <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="name" value="{{ client.name }}" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Contact</label>
            <input type="text" class="form-control" name="contact" value="{{ client.contact or '' }}"/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Description</label>
            <textarea class="form-control" name="description" rows="3">{{ client.description or '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-1"></i>Save</button>
            <a href="{{ url_for('clients.detail', client_id=client.id) }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
