{% extends "base.html" %}
{% block title %}New User{% endblock %}
{% block page_title %}Create User{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-header fw-semibold"><i class="bi bi-person-plus me-2"></i>Create New User</div>
      <div class="card-body">
        <form method="POST" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="username" required autocomplete="off"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
            <input type="email" class="form-control" name="email" required autocomplete="off"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
            <input type="password" class="form-control" name="password" minlength="8" required autocomplete="new-password"/>
            <div class="form-text">Minimum 8 characters.</div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Role</label>
            <div class="dropdown cs-wrapper">
              <button type="button" class="cs-toggle btn w-100 d-flex align-items-center justify-content-between" data-bs-toggle="dropdown" aria-expanded="false">
                <span class="cs-label">Analyst</span>
                <i class="bi bi-chevron-down cs-chevron ms-2 flex-shrink-0" aria-hidden="true"></i>
              </button>
              <ul class="cs-menu dropdown-menu w-100">
                <li><a class="cs-item dropdown-item active" href="#" data-value="analyst" onclick="csSet(this);return false;">Analyst</a></li>
                <li><a class="cs-item dropdown-item" href="#" data-value="admin" onclick="csSet(this);return false;">Admin</a></li>
              </ul>
              <input type="hidden" name="role" value="analyst">
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-1"></i>Create User</button>
            <a href="{{ url_for('auth.users_list') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
